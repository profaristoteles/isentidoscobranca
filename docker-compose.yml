name: siscobra-prod

services:
  sentidos_db:
    image: postgres:15-alpine
    container_name: siscobra_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-sentidos_cobrancas}
      POSTGRES_USER: ${DB_USER:-sentidos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-siscobra_pass_123}
    volumes:
      - siscobra_db_data:/var/lib/postgresql/data
    networks:
      - siscobra_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME:-sentidos_cobrancas} -U ${DB_USER:-sentidos_user}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sentidos_cobrancas:
    image: ghcr.io/profaristoteles/isentidoscobranca:latest
    pull_policy: always
    container_name: siscobra_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-sentidos_user}:${DB_PASSWORD:-siscobra_pass_123}@sentidos_db:5432/${DB_NAME:-sentidos_cobrancas}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
    networks:
      - traefik_network
      - siscobra_internal
    depends_on:
      sentidos_db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.siscobra.rule=Host(`${DOMAIN_NAME:-siscobra.isentidos.net.br}`)"
      - "traefik.http.routers.siscobra.entrypoints=websecure"
      - "traefik.http.routers.siscobra.tls.certresolver=letsencrypt"
      - "traefik.http.services.siscobra.loadbalancer.server.port=3001"
      - "traefik.http.services.siscobra.loadbalancer.passHostHeader=true"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  siscobra_db_data:
    name: siscobra_db_data_prod

networks:
  traefik_network:
    external: true
  siscobra_internal:
    internal: true
    name: siscobra_internal_net
