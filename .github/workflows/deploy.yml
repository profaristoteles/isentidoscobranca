name: Deploy de Produção (VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Entra na pasta do projeto na VPS
            cd isentidoscobranca
            
            # Garante que a VPS fique exatamente na versão publicada no GitHub
            git fetch origin main
            git reset --hard origin/main
            
            # Reconstrói o app sem cache e força recriação para publicar o dist novo
            docker compose build --no-cache sentidos_cobrancas
            docker compose up -d --force-recreate sentidos_cobrancas
            docker compose ps
